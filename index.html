<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Tabs Printer</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
  <div class="app-container">
    
    <!-- Top Drop Area -->
    <div class="drop-area" id="drop-area">
      <div class="drop-icon">📁</div>
      <div>
        <h2 style="font-weight: 600; font-size: 18px; margin-bottom: 4px;">Drag & Drop Folder or TXT File</h2>
        <p style="color: var(--text-secondary); font-size: 13px;">Auto-extracts names, removes extensions, numbers, and dashes.</p>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      
      <!-- Controls Panel (Left, Fixed) -->
      <div class="controls-panel">
        
        <div class="control-group">
          <label>Tab Density</label>
          <select id="tab-type">
            <option value="3">1/3 Cut (3 tabs/page)</option>
            <option value="5" selected>1/5 Cut (5 tabs/page) - Default</option>
            <option value="8">1/8 Cut (8 tabs/page)</option>
            <option value="25">1/25 Cut (Numeric Mode)</option>
          </select>
        </div>

        <div class="control-group">
          <label>Paper Size</label>
          <select id="paper-size">
            <option value="9x11" selected>Tabbed (9x11)</option>
            <option value="letter">Letter (8.5x11)</option>
          </select>
        </div>

        <div class="control-group">
          <label>Print Mode</label>
          <select id="print-mode">
            <option value="single" selected>Single Tab (1 tab per page)</option>
            <option value="full">Full Page (Fill all positions)</option>
          </select>
        </div>

        <div class="control-group">
          <label>Start Position</label>
          <input type="number" id="start-pos" value="1" min="1">
        </div>

        <div class="control-group" id="numeric-mode-controls" style="display: none; background: rgba(0,0,0,0.1); padding: 12px; border-radius: 8px;">
          <label style="color: var(--accent-color)">Numeric Range</label>
          <div class="row">
            <input type="number" id="num-start" value="1" min="1" placeholder="Start">
            <input type="number" id="num-end" value="25" min="1" placeholder="End">
          </div>
        </div>

        <div class="control-group">
          <label>Printer</label>
          <select id="printer-select">
            <option value="">Default System Printer</option>
          </select>
          <label class="toggle-row" style="margin-top: 4px;">
            <input type="checkbox" id="show-dialog">
            <span style="font-size: 13px;">Show System Print Dialog (pick tray)</span>
          </label>
          <span class="helper-text">* Uses system preset unless dialog shown</span>
          <button id="test-print-btn" class="btn btn-secondary btn-sm" style="margin-top: 6px;">📄 Test Print (1 Page)</button>
        </div>

        <!-- Advanced Options -->
        <div class="collapsible">
          <div class="collapsible-header" id="options-header">
            <span>Advanced Options</span>
            <span>▼</span>
          </div>
          <div class="collapsible-content" id="options-content">
            
            <div class="control-group">
              <label>Offsets (mm)</label>
              <div class="row">
                <input type="number" id="offset-x" value="0" step="0.5" placeholder="X">
                <input type="number" id="offset-y" value="0" step="0.5" placeholder="Y">
              </div>
            </div>

            <div class="control-group">
              <label>Page Range</label>
              <input type="text" id="page-range" placeholder="e.g. 1-3, 5 (blank for all)">
            </div>

            <div class="control-group">
              <label>Copies</label>
              <input type="number" id="copies" value="1" min="1">
            </div>

            <label class="toggle-row">
              <input type="checkbox" id="sort-az" checked>
              <span>Sort A-Z</span>
            </label>

            <label class="toggle-row">
              <input type="checkbox" id="rotate-page">
              <span>Rotate Page 180°</span>
            </label>

            <label class="toggle-row">
              <input type="checkbox" id="rotate-text">
              <span>Rotate Text 180°</span>
            </label>

            <label class="toggle-row">
              <input type="checkbox" id="debug-overlay">
              <span>Debug Layout Lines</span>
            </label>

            <div class="control-group">
              <label>Manual Reorder</label>
              <div class="sortable-list" id="manual-reorder-list">
                <div style="padding: 8px; color: var(--text-secondary); text-align: center; font-size: 12px;">Load data first</div>
              </div>
            </div>

          </div>
        </div>

      </div>

      <!-- Resizer (Split Bar) -->
      <div class="resizer" id="resizer"></div>

      <!-- Preview Panel (Right, Flexible, 70%+) -->
      <div class="preview-panel">
        <div class="preview-header">
          <h2>Tab Preview (Zoomed)</h2>
          <span id="preview-status" class="badge">0 items</span>
        </div>
        
        <div class="preview-content" id="preview-container">
          <!-- Zoomed tab previews go here -->
          <div class="empty-state">
            Drop files to see high-res tab preview
          </div>
        </div>
        
        <!-- Print Summary & Action -->
        <div class="print-footer">
          <div class="print-summary" id="print-summary" style="display: none;">
            <div id="summary-details"></div>
          </div>
          <button class="btn btn-large" id="print-btn" disabled>
            🖨️ Print
          </button>
        </div>
      </div>
      
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
